<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DriveSense</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');

    :root {
      --bg-base: #F7F5F2;
      --bg-surface: #EFECE8;
      --bg-hover: #E8E4DE;
      --text-primary: #1C1A17;
      --text-secondary: #6B6560;
      --text-ghost: #A09890;
      --accent: #5C7A6E;
      --accent-hover: #4A6659;
      --signal: #C47B3A;
      --border: #DDD9D3;
      --border-subtle: #E8E4DE;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --font-display: 'Fraunces', serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-base: #181613;
        --bg-surface: #221F1B;
        --bg-hover: #2A2720;
        --text-primary: #EDE9E3;
        --text-secondary: #8C8278;
        --text-ghost: #5C5650;
        --accent: #7BA394;
        --accent-hover: #8FB5A8;
        --signal: #D4904A;
        --border: #2E2B26;
        --border-subtle: #252320;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 360px;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.4;
    }

    /* Header Bar */
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .wordmark {
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--text-primary);
    }

    .context-pill {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-surface);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Status Strip */
    .status-strip {
      padding: 12px 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-ghost);
    }

    .status-dot.watching {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(92, 122, 110, 0.1);
      animation: pulse 2s infinite;
    }

    .status-dot.pending {
      background: var(--signal);
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.2);
        opacity: 0.7;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .status-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* Content Section */
    .section {
      padding: 20px;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 18px;
      margin-bottom: 12px;
    }

    /* Cards */
    .count-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .count-val {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .count-lbl {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Forms */
    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 8px 12px;
      font-family: var(--font-body);
      font-size: 13px;
      outline: none;
      transition: border-color 0.12s;
    }

    input:focus {
      border-color: var(--accent);
    }

    /* Buttons */
    button {
      cursor: pointer;
      border: none;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      width: 100%;
      transition: background 0.12s;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-link {
      background: none;
      color: var(--accent);
      text-decoration: underline;
      font-weight: 500;
    }

    .btn-ghost {
      background: none;
      color: var(--text-ghost);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: color 0.12s, border-color 0.12s;
    }

    .btn-ghost:hover {
      color: var(--text-secondary);
      border-color: var(--border);
    }

    /* Collapsible */
    .collapsible-trigger {
      width: 100%;
      text-align: left;
      background: none;
      color: var(--text-secondary);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .collapsible-content {
      display: none;
      padding-top: 8px;
    }

    .collapsible-content.open {
      display: block;
    }

    .hint {
      font-size: 12px;
      line-height: 1.45;
      color: var(--text-secondary);
      margin: 0 0 4px;
    }

    /* Footer */
    .footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-ghost);
    }

    #footerStatus.success {
      color: var(--accent);
    }

    #footerStatus.error {
      color: var(--signal);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="wordmark">DriveSense</div>
    <div class="context-pill" id="contextIndicator">Global</div>
  </header>

  <div class="status-strip">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">Watching items…</div>
  </div>

  <div class="section">
    <!-- Logged Out View -->
    <div id="loggedOutView" class="hidden">
      <div style="text-align: center; padding: 10px 0;">
        <h2 class="section-title">Welcome to DriveSense</h2>
        <p class="hint" style="margin-bottom: 24px;">
          Clean up years of messy files with silent, intelligent suggestions.
        </p>

        <div id="contextAction" style="margin-bottom: 16px;">
          <!-- Dynamic button injected here -->
        </div>

        <button class="btn-ghost" id="openDashboardFull" style="width:100%">Open Dashboard ↗</button>
      </div>
    </div>

    <!-- Logged In View -->
    <div id="loggedInView" class="hidden">
      <div id="unlinkedWarning" class="hidden"
        style="background:rgba(196, 123, 58, 0.1); border: 1px solid var(--signal); border-radius: var(--radius-md); padding: 12px; margin-bottom: 16px;">
        <p style="font-size: 12px; color: var(--signal); font-weight: 600; margin-bottom: 8px;">Identity Mismatch</p>
        <p class="hint" id="unlinkedText" style="margin-bottom: 12px;">This account is not linked.</p>
        <button class="btn-primary" id="linkCurrentAccount"
          style="background: var(--signal); padding: 6px 12px; width: auto; font-size: 12px;">Link this account</button>
      </div>

      <div class="count-card">
        <div>
          <div class="count-val" id="suggestionCount">0</div>
          <div class="count-lbl">waiting for review</div>
        </div>
        <button class="btn-link" id="openDashboard">Dashboard ↗</button>
      </div>

      <p class="hint" id="hintText">Your session is active. Suggestions will appear here and on the dashboard as they
        are detected.</p>

      <div style="margin-top: 20px;">
        <button class="collapsible-trigger" id="byokToggle">
          <span id="byokArrow">▶</span> BYOK Keys (local)
        </button>
        <div class="collapsible-content" id="byokSection">
          <div class="field">
            <label for="keyGemini">Gemini</label>
            <input type="password" id="keyGemini" autocomplete="off" />
          </div>
          <div class="field">
            <label for="keyOpenai">OpenAI</label>
            <input type="password" id="keyOpenai" autocomplete="off" />
          </div>
          <div class="field">
            <label for="keyAnthropic">Anthropic</label>
            <input type="password" id="keyAnthropic" autocomplete="off" />
          </div>
          <div class="field">
            <label for="keyGlm">GLM</label>
            <input type="password" id="keyGlm" autocomplete="off" />
          </div>
          <button class="btn-ghost" id="saveKeys" style="width:100%">Save Keys</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <span id="footerStatus">Ready</span>
    <button class="btn-link" id="refreshBtn" style="text-decoration:none; color:inherit;">↻ Refresh</button>
  </footer>

  <script type="module" src="popup.js"></script>
</body>

</html>
